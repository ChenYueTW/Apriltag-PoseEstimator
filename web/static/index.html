<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AprilTag Pose Estimator</title>
  <link rel="stylesheet" href="css/style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "/lib/three.module.js",
        "three/addons/": "/lib/"
      }
    }
  </script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">▦</span>
      <span>AprilTag Pose Estimator</span>
    </div>
    <div class="status" id="status-bar">
      <span class="pill" id="pill-backend">backend: …</span>
      <span class="pill" id="pill-fps">FPS: –</span>
      <span class="pill" id="pill-tags">tags: 0</span>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="live">📷 即時影像 Live</button>
    <button class="tab" data-tab="settings">⚙️ 鏡頭設定 Settings</button>
    <button class="tab" data-tab="sim">🧊 3D 模擬 Simulation</button>
    <button class="tab" data-tab="experiment">🧪 實驗 Experiment</button>
  </nav>

  <main>
    <!-- ───────────────────────── Live ───────────────────────── -->
    <section class="panel active" id="tab-live">
      <div class="live-grid">
        <div class="video-wrap">
          <img id="video" class="mjpeg" data-src="/video_feed" alt="camera feed" />
        </div>
        <div class="info-card">
          <h2>偵測到的 AprilTag</h2>
          <div class="table-scroll">
            <table id="detections-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>新方法 Novel (x, y, z)</th>
                  <th>PnP IPPE (x, y, z)</th>
                  <th>距離 m</th>
                  <th>IPPE 誤差 px</th>
                </tr>
              </thead>
              <tbody id="detections-body">
                <tr class="empty"><td colspan="5">尚未偵測到 tag</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

    <!-- ─────────────────────── Settings ─────────────────────── -->
    <section class="panel" id="tab-settings">
      <div class="settings-grid">
        <div class="card">
          <h2>鏡頭設定 Camera Settings</h2>
          <p class="hint">調整後即時套用並自動儲存，重新啟動後會記住上次設定。</p>
          <form id="settings-form" class="form-grid"></form>
          <div class="toolbar">
            <button type="button" class="btn secondary" id="settings-reset">重設為預設值 Reset</button>
            <span class="hint" id="settings-status"></span>
          </div>
        </div>
        <div class="card">
          <h2>預覽 Preview</h2>
          <div class="video-wrap">
            <img id="settings-video" class="mjpeg" data-src="/video_feed" alt="camera feed" />
          </div>
        </div>
      </div>
    </section>

    <!-- ───────────────────────── 3D ─────────────────────────── -->
    <section class="panel" id="tab-sim">
      <div class="sim-wrap">
        <div id="sim-canvas"></div>
        <div class="sim-legend">
          <div class="legend-row"><span class="swatch cam"></span>相機 Camera + 視錐</div>
          <div class="legend-row"><span class="swatch novel"></span>新方法 Novel pose</div>
          <div class="legend-row"><span class="swatch ippe"></span>PnP IPPE pose + 朝向</div>
          <div class="legend-hint">滑鼠左鍵旋轉 · 右鍵平移 · 滾輪縮放</div>
          <div class="legend-hint" id="sim-status">載入中…</div>
        </div>
      </div>
    </section>

    <!-- ─────────────────────── Experiment ───────────────────── -->
    <section class="panel" id="tab-experiment">
      <div class="placeholder" id="experiment-placeholder">實驗分頁（Part 5）</div>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script src="js/live.js"></script>
  <script src="js/settings.js"></script>
  <script type="module" src="js/sim3d.js"></script>
</body>
</html>
